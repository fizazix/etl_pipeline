services:
  mysql:
    image: mysql:8.4
    command: --require_secure_transport=OFF
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ingestion
      MYSQL_USER: ingestion
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  source-api:
    build:
      context: ./source-api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/records"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: IngestionPipeline
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ingestion
      DB_USERNAME: ingestion
      DB_PASSWORD: secret
      SOURCE_API_URL: http://source-api:8080/records
      INGESTION_PIPELINE_NAME: default
      INGESTION_MAX_RETRIES: 5
      INGESTION_BACKOFF_BASE_MS: 100
      INGESTION_BACKOFF_MAX_MS: 2000
    depends_on:
      mysql:
        condition: service_healthy
      source-api:
        condition: service_healthy

volumes:
  mysql_data:
