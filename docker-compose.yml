x-laravel-env: &laravel-env
  APP_NAME: EtlPipeline
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:8080
  APP_KEY: base64:RW1haWxMaW5rVmVyaWZ5S2V5MTIzNDU2Nzg5MA==
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: etl
  DB_USERNAME: etl
  DB_PASSWORD: secret
  SOURCE_API_URL: http://source-api:8081/records
  SOURCE_API_TIMEOUT: 5
  SOURCE_API_PAGE_SIZE: 50
  SOURCE_API_REQUESTS_PER_SECOND: 4
  SOURCE_API_MAX_ATTEMPTS: 5

services:
  mysql:
    image: mysql:8.4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --require_secure_transport=OFF
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: etl
      MYSQL_USER: etl
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    environment:
      <<: *laravel-env
    command: php artisan migrate --force
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  source-api:
    build:
      context: ./source-api
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    ports:
      - "8080:8000"
    environment:
      <<: *laravel-env
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      migrate:
        condition: service_completed_successfully

  etl:
    build:
      context: .
    environment:
      <<: *laravel-env
    command: php artisan etl:run
    restart: on-failure
    depends_on:
      migrate:
        condition: service_completed_successfully
      source-api:
        condition: service_healthy

  test:
    build:
      context: .
    environment:
      <<: *laravel-env
      APP_ENV: testing
      DB_DATABASE: etl_test
    command: sh docker/test.sh
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

volumes:
  mysql_data:
